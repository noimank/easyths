name: 功能请求
description: 建议新增功能或改进现有功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议！请描述清楚你的使用场景和需求。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 需求场景
      description: 你现在遇到的问题，或者这个功能将解决什么场景
      placeholder: |
        例如：我需要定时批量撤单，但当前 API 一次只能撤一个
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何解决这个问题
      placeholder: |
        例如：新增批量撤单接口，支持传入多个委托号
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你有没有考虑过其他解决方式
      placeholder: |
        例如：目前我通过循环调用单条撤单接口实现，但效率较低
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、示例代码或其他有助于理解的材料
    validations:
      required: false
