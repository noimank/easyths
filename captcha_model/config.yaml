Global:
  use_gpu: true
  # Character set: digits + uppercase + lowercase letters
  character: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  # Image size
  img_h: 64
  img_w: 256
  # Random seed
  seed: 42
  # Output directory
  output_dir: "outputs"
  # Resume from best model if exists
  resume: true

Architecture:
  name: ResNetOCR
  backbone:
    name: ResNet34
    pretrained: true
    freeze_backbone: false
  encoder:
    seq_len: 32
  head:
    hidden_dim: 128
    dropout: 0.3

Loss:
  name: CTCLoss

Optimizer:
  name: AdamW
  lr: 0.0001
  weight_decay: 0.00001

Scheduler:
  name: CosineWarmup
  warmup_epoch: 5
  epochs: 200

Training:
  batch_size: 32
  num_workers: 0
  amp: false
  save_interval: 20

DataAugmentation:
  enabled: true
  brightness_prob: 0.5
  brightness_range: [0.8, 1.2]
  contrast_prob: 0.5
  contrast_range: [0.8, 1.2]
  rotation_prob: 0.3
  rotation_range: [-5, 5]
  noise_prob: 0.3
  noise_std: 0.02
  blur_prob: 0.2
  blur_kernel_range: [3, 5]
  cutout_prob: 0.1
  cutout_size: 10

Dataset:
  train_dir: data/train
  val_dir: data/val

Eval:
  test_dir: data/test
