# Fine-tuning configuration
# Use this config when fine-tuning a pre-trained model
#
# Usage: python train.py --config config_finetune.yaml

Global:
  use_gpu: true
  character: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  img_h: 64
  img_w: 256
  seed: 42742
  output_dir: "outputs"
  resume: true  # load best_model.pt

Architecture:
  backbone:
    nc: 1
  head:
    hidden_dim: 128

Optimizer:
  # Lower LR for fine-tuning
  lr: 0.00012
  weight_decay: 0.0001

Scheduler:
  # ReduceLROnPlateau is recommended for fine-tuning:
  # - Starts with fixed LR
  # - Reduces LR when validation metric plateaus
  # - Allows model to converge at its own pace
  type: reduce_on_plateau
  epochs: 200
  factor: 0.5           # LR * 0.5 when plateau
  patience: 15           # wait 15 epochs before reducing
  min_lr: 0.000004     # minimum LR

  # Alternative options for fine-tuning:
  #
  # type: constant       # Fixed LR throughout, simplest option
  #
  # type: cosine         # Smooth decay with restarts
  # T_0: 10
  # T_mult: 2
  # eta_min: 0.000001

Training:
  batch_size: 64
  num_workers: 4
  save_interval: 10
  early_stopping:
    patience: 40
    min_delta: 0.0001

DataAugmentation:
  # Lighter augmentation for fine-tuning
  enabled: true
  brightness_prob: 0.3
  brightness_range: [0.9, 1.3]
  contrast_prob: 0.3
  contrast_range: [0.9, 1.3]
  rotation_prob: 0.1
  rotation_range: [-3, 3]
  noise_prob: 0.3
  noise_std: 0.04
  blur_prob: 0.3
  blur_kernel_range: [3, 5]
  cutout_prob: 0.1
  cutout_size: 10

Dataset:
  train_dir: data/train
  val_dir: data/val

Eval:
  test_dir: data/test
